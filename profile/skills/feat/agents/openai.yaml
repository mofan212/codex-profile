interface:
  display_name: "Feat"
  short_description: "显式新建或基于产物续跑 feat 工作流"
  default_prompt: "Use $feat to start a new requirement draft workflow only when the user explicitly invokes feat or $feat with a new requirement; continue only from existing feat artifacts such as a requirement document, Issue, or .feat-tmp directory; ask one confirmation question for ambiguous full-workflow requests without explicit feat invocation; create the draft, pause for user completion, clarify it, refine it, slice issues, check code facts before implementation, handle reviews, record implementation notes under .feat-tmp/issues, and archive AI retrieval documentation."
