interface:
  display_name: "Node HTTP Fetch"
  short_description: "用 Node.js 内置 fetch 调用 HTTP/API 接口。"
  default_prompt: "按 $node-http-fetch 的规则调用 HTTP/API 接口；默认使用 Node.js 内置 fetch，不安装或导入 node-fetch，除非用户明确要求否则不先用 PowerShell Invoke-WebRequest 或 Windows curl.exe。Cookie、Bearer Token、API Key 等敏感值优先通过环境变量传入；Node 不可用时报告阻塞；输出 HTTP 状态、可解析响应或原始文本兜底和关键错误。"
